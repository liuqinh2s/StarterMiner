name: Daily Startup Report

on:
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch startup data
        run: python scripts/fetch_startups.py
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
          ITJUZI_COOKIE: ${{ secrets.ITJUZI_COOKIE }}
          JINGDATA_TOKEN: ${{ secrets.JINGDATA_TOKEN }}
          CRUNCHBASE_API_KEY: ${{ secrets.CRUNCHBASE_API_KEY }}
          ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          XUEQIU_COOKIE: ${{ secrets.XUEQIU_COOKIE }}

      - name: AI filter and analysis
        run: python scripts/ai_filter.py
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Fetch contacts and hiring info
        run: python scripts/fetch_contacts.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOSS_COOKIE: ${{ secrets.BOSS_COOKIE }}
          LAGOU_COOKIE: ${{ secrets.LAGOU_COOKIE }}
          TIANYANCHA_TOKEN: ${{ secrets.TIANYANCHA_TOKEN }}

      - name: Build site data
        run: python scripts/build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ site/data/ raw/
          git diff --staged --quiet || git commit -m "📊 Daily report $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: generate-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
